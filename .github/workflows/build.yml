name: Build dylib

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -L --output /tmp/sdks.zip \
            "https://github.com/theos/sdks/archive/refs/heads/master.zip"
          unzip -q /tmp/sdks.zip -d /tmp/sdks
          mv /tmp/sdks/sdks-master/*.sdk ~/theos/sdks/

      - name: Build
        run: |
          export THEOS=~/theos
          export THEOS_MAKE_PATH=~/theos/makefiles
          make FINALPACKAGE=1 STRIP=1

      - name: Find dylib
        run: find .theos/obj -name "*.dylib"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: 80poolUnlimited.dylib
          path: .theos/obj/release/80poolUnlimited.dylib
